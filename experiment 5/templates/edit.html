{% extends "base.html" %}

{% block title %}Edit Post — SimpleBlog{% endblock %}

{% block content %}

  <h1 class="page-heading">Edit Post #{{ post.id }}</h1>

  <!-- =====================================================
       EDIT FORM
       Action → POST /edit/<post_id>
       Fields are PRE-FILLED with existing post data via
       the `post` variable passed from the edit() route.
  ===================================================== -->
  <div class="form-card">

    <form action="{{ url_for('edit', post_id=post.id) }}" method="POST">

      <!-- Title field — pre-filled with current title -->
      <div class="form-group">
        <label for="title">Post Title *</label>
        <input
          type="text"
          id="title"
          name="title"
          value="{{ post.title }}"
          maxlength="200"
          required
        />
      </div>

      <!-- Content field — pre-filled with current content -->
      <div class="form-group">
        <label for="content">Content *</label>
        <textarea
          id="content"
          name="content"
          required
        >{{ post.content }}</textarea>
      </div>

      <!-- Form action buttons -->
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
      </div>

    </form>
  </div>

{% endblock %}
