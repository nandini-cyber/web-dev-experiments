<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Simple Blog{% endblock %}</title>

  <!-- Google Fonts: Playfair Display (headings) + Lato (body) -->
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>

  <style>
    /* ============================================================
       CSS RESET & VARIABLES
    ============================================================ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg        : #faf8f4;          /* warm off-white */
      --surface   : #ffffff;
      --ink       : #1a1714;          /* near-black */
      --muted     : #7a7269;          /* grey for meta text */
      --accent    : #c0392b;          /* editorial red */
      --accent-lt : #f9eded;          /* tint for hover states */
      --border    : #e4dfd7;
      --radius    : 6px;
      --shadow    : 0 2px 12px rgba(0,0,0,.08);
      --max-w     : 860px;
      --font-head : 'Playfair Display', Georgia, serif;
      --font-body : 'Lato', 'Helvetica Neue', Arial, sans-serif;
    }

    /* ============================================================
       BASE
    ============================================================ */
    body {
      background : var(--bg);
      color      : var(--ink);
      font-family: var(--font-body);
      font-size  : 16px;
      line-height: 1.7;
      min-height : 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ============================================================
       HEADER / NAVBAR
    ============================================================ */
    header {
      background    : var(--ink);
      padding       : 0 2rem;
      position      : sticky;
      top           : 0;
      z-index       : 100;
      display       : flex;
      align-items   : center;
      justify-content: space-between;
      height        : 64px;
      box-shadow    : 0 2px 16px rgba(0,0,0,.25);
    }

    .brand {
      font-family: var(--font-head);
      font-size  : 1.5rem;
      color      : #fff;
      letter-spacing: 1px;
    }
    .brand span { color: var(--accent); }

    nav { display: flex; gap: 1.5rem; align-items: center; }

    nav a {
      color      : rgba(255,255,255,.75);
      font-size  : .9rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding    : .35rem .8rem;
      border-radius: var(--radius);
      transition : background .2s, color .2s;
    }
    nav a:hover { background: rgba(255,255,255,.1); color: #fff; text-decoration: none; }
    nav a.btn-nav {
      background: var(--accent);
      color     : #fff;
    }
    nav a.btn-nav:hover { background: #a93226; }

    /* ============================================================
       MAIN CONTAINER
    ============================================================ */
    main {
      max-width : var(--max-w);
      margin    : 2.5rem auto;
      padding   : 0 1.5rem;
    }

    /* ============================================================
       PAGE HEADING
    ============================================================ */
    .page-heading {
      font-family: var(--font-head);
      font-size  : 2.2rem;
      margin-bottom: 1.5rem;
      padding-bottom: .75rem;
      border-bottom: 2px solid var(--border);
    }

    /* ============================================================
       FLASH / ALERT BANNER
    ============================================================ */
    .alert {
      background: #fdf3f2;
      border-left: 4px solid var(--accent);
      padding   : .75rem 1rem;
      margin-bottom: 1.5rem;
      border-radius: var(--radius);
      font-size : .92rem;
      color     : var(--accent);
    }

    /* ============================================================
       CARD (used for each blog post)
    ============================================================ */
    .card {
      background   : var(--surface);
      border       : 1px solid var(--border);
      border-radius: var(--radius);
      padding      : 1.75rem 2rem;
      margin-bottom: 1.5rem;
      box-shadow   : var(--shadow);
      transition   : transform .18s, box-shadow .18s;
    }
    .card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,.11); }

    .card-title {
      font-family: var(--font-head);
      font-size  : 1.5rem;
      margin-bottom: .5rem;
    }

    .card-content {
      color    : var(--ink);
      font-size: .97rem;
      white-space: pre-wrap;      /* preserve line breaks from textarea */
      margin-bottom: 1.2rem;
    }

    .card-meta {
      font-size: .8rem;
      color    : var(--muted);
      margin-bottom: .9rem;
    }

    /* ============================================================
       CARD ACTION BUTTONS
    ============================================================ */
    .card-actions { display: flex; gap: .75rem; align-items: center; }

    .btn {
      display    : inline-block;
      font-family: var(--font-body);
      font-size  : .85rem;
      font-weight: 700;
      letter-spacing: .05em;
      padding    : .4rem 1.1rem;
      border-radius: var(--radius);
      border     : 2px solid transparent;
      cursor     : pointer;
      transition : background .18s, color .18s, border-color .18s;
      text-transform: uppercase;
    }

    .btn-edit {
      background : transparent;
      border-color: var(--ink);
      color      : var(--ink);
    }
    .btn-edit:hover { background: var(--ink); color: #fff; text-decoration: none; }

    .btn-delete {
      background : transparent;
      border-color: var(--accent);
      color      : var(--accent);
    }
    .btn-delete:hover { background: var(--accent); color: #fff; }

    .btn-primary {
      background: var(--accent);
      color     : #fff;
      border-color: var(--accent);
    }
    .btn-primary:hover { background: #a93226; border-color: #a93226; text-decoration: none; }

    .btn-secondary {
      background: transparent;
      color     : var(--muted);
      border-color: var(--border);
    }
    .btn-secondary:hover { border-color: var(--muted); color: var(--ink); text-decoration: none; }

    /* ============================================================
       FORMS
    ============================================================ */
    .form-card {
      background   : var(--surface);
      border       : 1px solid var(--border);
      border-radius: var(--radius);
      padding      : 2.5rem;
      box-shadow   : var(--shadow);
    }

    .form-group { margin-bottom: 1.4rem; }

    label {
      display    : block;
      font-weight: 700;
      font-size  : .88rem;
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: .45rem;
      color      : var(--muted);
    }

    input[type="text"],
    textarea {
      width        : 100%;
      font-family  : var(--font-body);
      font-size    : 1rem;
      color        : var(--ink);
      background   : var(--bg);
      border       : 1.5px solid var(--border);
      border-radius: var(--radius);
      padding      : .65rem .9rem;
      transition   : border-color .18s, box-shadow .18s;
      outline      : none;
    }
    input[type="text"]:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow  : 0 0 0 3px rgba(192,57,43,.12);
    }

    textarea { resize: vertical; min-height: 160px; line-height: 1.6; }

    .form-actions { display: flex; gap: 1rem; margin-top: 1.75rem; }

    /* ============================================================
       EMPTY STATE
    ============================================================ */
    .empty-state {
      text-align: center;
      padding   : 4rem 2rem;
      color     : var(--muted);
    }
    .empty-state .icon { font-size: 3.5rem; margin-bottom: 1rem; }
    .empty-state h2 { font-family: var(--font-head); font-size: 1.8rem; color: var(--ink); margin-bottom: .5rem; }
    .empty-state p  { margin-bottom: 1.5rem; }

    /* ============================================================
       FOOTER
    ============================================================ */
    footer {
      text-align : center;
      padding    : 2rem;
      font-size  : .82rem;
      color      : var(--muted);
      border-top : 1px solid var(--border);
      margin-top : 3rem;
    }
  </style>
</head>
<body>

  <!-- ========== NAVIGATION HEADER ========== -->
  <header>
    <div class="brand">Simple<span>Blog</span></div>
    <nav>
      <a href="{{ url_for('index') }}">Home</a>
      <a href="{{ url_for('create') }}" class="btn-nav">+ New Post</a>
    </nav>
  </header>

  <!-- ========== PAGE CONTENT (child templates inject here) ========== -->
  <main>
    {% block content %}{% endblock %}
  </main>

  <!-- ========== FOOTER ========== -->
  <footer>
    &copy; 2026 SimpleBlog &mdash; Flask CRUD Experiment 5
  </footer>

</body>
</html>
