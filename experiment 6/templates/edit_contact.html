{% extends "base.html" %}

{% block title %}Edit Contact — ContactManager{% endblock %}

{% block content %}

  <h1 class="page-heading">✏️ Edit Contact #{{ contact.id }}</h1>

  <div class="form-card">

    <!-- Show validation error if any field was left empty -->
    {% if error %}
      <div class="alert-error">⚠️ {{ error }}</div>
    {% endif %}

    <!-- =====================================================
         EDIT CONTACT FORM
         Action → POST /edit/<contact_id>
         Fields are PRE-FILLED with existing contact data
         passed from the edit_contact() route via `contact`.
    ===================================================== -->
    <form action="{{ url_for('edit_contact', contact_id=contact.id) }}" method="POST">

      <!-- Name field — pre-filled with current name -->
      <div class="form-group">
        <label for="name">Full Name *</label>
        <input
          type="text"
          id="name"
          name="name"
          value="{{ contact.name }}"
          maxlength="100"
          required
        />
      </div>

      <!-- Phone field — pre-filled with current phone -->
      <div class="form-group">
        <label for="phone">Phone Number *</label>
        <input
          type="tel"
          id="phone"
          name="phone"
          value="{{ contact.phone }}"
          maxlength="20"
          required
        />
      </div>

      <!-- Email field — pre-filled with current email -->
      <div class="form-group">
        <label for="email">Email Address *</label>
        <input
          type="email"
          id="email"
          name="email"
          value="{{ contact.email }}"
          maxlength="150"
          required
        />
      </div>

      <!-- Form action buttons -->
      <div class="form-actions">
        <button type="submit" class="btn btn-primary">Update Contact</button>
        <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
      </div>

    </form>
  </div>

{% endblock %}
